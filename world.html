<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel | Fan Feng</title>
  <meta name="description" content="Unlocking the world — Fan Feng's travel photos and stories on a borderless map.">
  <meta name="theme-color" content="#070b15">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%236bb4ff'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    (function () { try { var t = localStorage.getItem("site_theme"); if (!t && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) t = "light"; if (t === "light") document.documentElement.setAttribute("data-theme", "light"); } catch (e) {} })();
  </script>
</head>
<body data-page="world">
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="grid-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <a href="index.html" class="brand"><span class="brand-dot"></span><span>Fan Feng</span></a>
    <nav class="site-nav" aria-label="Primary">
      <a href="index.html" data-i18n="nav.home"></a>
      <a href="cv.html" data-i18n="nav.cv"></a>
      <a href="news.html" data-i18n="nav.news"></a>
      <a href="works.html" data-i18n="nav.works"></a>
      <a href="world.html" data-i18n="nav.world"></a>
    </nav>
    <div class="nav-actions">
      <button class="icon-btn" id="themeToggle" type="button" data-i18n-aria="a11y.toggleTheme" aria-label="Toggle theme"></button>
      <button class="lang-switch" id="langSwitch" type="button" data-i18n-aria="a11y.toggleLang" aria-label="Switch language"></button>
      <button class="icon-btn nav-toggle" id="navToggle" type="button" data-i18n-aria="a11y.toggleNav" aria-expanded="false" aria-label="Toggle navigation"></button>
    </div>
  </header>

  <main class="page">
    <section class="section glass">
      <div class="section-head">
        <p class="kicker" data-i18n="world.kicker"></p>
        <h1 data-i18n="world.title"></h1>
        <p class="lead" data-i18n="world.subtitle"></p>
      </div>
      <div class="world-map-wrap" id="worldMapWrap">
        <img src="assets/maps/World_map_blank_without_borders.svg" alt="World map" class="world-map">
        <div id="worldPins"></div>
        <div id="calibrationOverlay" class="calibration-overlay" hidden>
          <span class="cal-label">Click the map to capture coordinates</span>
          <code id="calibrationValue">—</code>
        </div>
      </div>
      <p class="meta-note" style="margin-top:14px" data-i18n="world.tip"></p>
    </section>
  </main>

  <dialog id="worldDialog" class="world-dialog">
    <button id="closeDialog" class="dialog-close" type="button" aria-label="Close">×</button>
    <img id="dialogImage" src="" alt="">
    <h2 id="dialogTitle"></h2>
    <p id="dialogDesc"></p>
    <p><a id="dialogLink" href="#" target="_blank" rel="noopener" style="display:none"></a></p>
  </dialog>

  <footer class="site-footer">
    <p><span data-i18n="footer.contact"></span> <a href="mailto:fan.feng@vumc.org">fan.feng@vumc.org</a></p>
    <p><span data-i18n="footer.social"></span> <a href="https://scholar.google.com/citations?user=1EXo-hIAAAAJ&hl=en" target="_blank" rel="noopener">Google Scholar</a> · <a href="https://github.com/dmcbffeng" target="_blank" rel="noopener">GitHub</a> · <a href="https://www.linkedin.com/in/fan-feng-974842120/" target="_blank" rel="noopener">LinkedIn</a></p>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
